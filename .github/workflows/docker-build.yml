steps:
  - name: Checkout code
    uses: actions/checkout@v4

  # 1. This is the "Magic" step needed for Caching to work
  - name: Set up Docker Buildx
    uses: docker/setup-buildx-action@v3

  # 2. Log in as we discussed
  - name: Login to Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  # 3. Now your Build and Push step will work with Cache!
  - name: Build and push Server
    uses: docker/build-push-action@v5
    with:
      context: ./server
      push: true
      tags: |
        ${{ secrets.DOCKER_USERNAME }}/ocr-server:latest
        ${{ secrets.DOCKER_USERNAME }}/ocr-server:${{ github.sha }}
      cache-from: type=gha
      cache-to: type=gha,mode=max
