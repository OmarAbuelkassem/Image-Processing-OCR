
services:
  server:
    build: ./server
    ports: 
      - "7860:7860"
    volumes:
      - ./server:/app
      - /app/node_modules
    env_file:
      - ./server/.env

  client:
    build: ./client/Image-Processing
    ports: 
      - "5173:5173"
    volumes:
      - ./client/Image-Processing:/app
      - /app/node_modules
    depends_on:
    - server


